<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harga BBM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h2 id="title">Loading...</h2>

    <div class="controls">

      <input list="wilayahList" id="search" placeholder="Cari wilayah...">
      <datalist id="wilayahList"></datalist>

      <select id="typeSelect">
        <option value="0">Gasoline</option>
        <option value="1">Gasoil</option>
      </select>

      <select id="bbmFilter">
        <option value="all">Semua BBM</option>
      </select>

      <select id="sort">
        <option value="default">Urutan Default</option>
        <option value="asc">Termurah</option>
        <option value="desc">Termahal</option>
      </select>

      <button id="refreshBtn">🔄</button>
<button id="toggleTheme">🌙</button>

    </div>
  </div>

  <div class="table-container">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
