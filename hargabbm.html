<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harga BBM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Harga BBM Indonesia</h1>
  <div id="update-info">Memuat data...</div>
</header>

<section class="filter">
  <select id="filter-wilayah">
    <option value="ALL">Lihat Semua Wilayah</option>
  </select>

  <select id="filter-jenis">
    <option value="ALL">Lihat Semua</option>
    <option value="GASOLINE">Gasoline</option>
    <option value="GASOIL">Gas Oil</option>
  </select>
</section>

<section class="table-section">
  <table>
    <thead>
      <tr id="table-head">
        <th>Wilayah</th>
        <th>Kolom 1</th>
        <th>Kolom 2</th>
        <th>Kolom 3</th>
        <th>Kolom 4</th>
      </tr>
    </thead>
    <tbody id="bbm-body"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
